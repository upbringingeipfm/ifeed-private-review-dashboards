  <style>
    :root {
      --bg: oklch(96.5% 0.008 230);
      --bg-2: oklch(94% 0.010 230);
      --surface: oklch(98% 0.006 230);
      --surface-2: oklch(95.5% 0.009 230);
      --rule: oklch(85% 0.014 230);
      --rule-2: oklch(76% 0.018 230);
      --ink: oklch(20% 0.030 250);
      --ink-2: oklch(34% 0.024 250);
      --ink-3: oklch(50% 0.020 250);
      --ink-4: oklch(66% 0.016 230);
      --accent: oklch(50% 0.10 200);
      --accent-bg: oklch(93% 0.030 200);
      --signal: oklch(62% 0.16 65);
      --signal-bg: oklch(94% 0.04 70);
      --converge: oklch(50% 0.13 145);
      --converge-bg: oklch(94% 0.04 145);
      --danger: oklch(53% 0.17 28);
      --danger-bg: oklch(95% 0.04 28);
      --violet: oklch(50% 0.13 292);
      --violet-bg: oklch(94% 0.035 292);

      --shadow-2: 0 4px 16px oklch(20% 0.03 250 / 0.08);
      --logo-ink: #1a2b3a;
      --logo-accent: #207782;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-2); color: var(--ink); font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
    body { padding: 14px; }
    .app { height: calc(100vh - 28px); background: var(--bg); border: 1px solid var(--rule); border-radius: 28px; box-shadow: var(--shadow-2); overflow: hidden; display: grid; grid-template-rows: auto minmax(0, 1fr); }
    header {
      position: relative; z-index: 10;
      display: flex; align-items: center; gap: 18px;
      margin: 12px;
      padding: 10px 16px 10px 22px;
      min-height: 64px;
      background: var(--surface);
      border: 1.5px solid color-mix(in srgb, var(--accent) 22%, var(--rule));
      border-radius: 28px;
      box-shadow: 0 1px 0 color-mix(in srgb, var(--accent) 14%, transparent) inset, 0 22px 48px -22px color-mix(in srgb, var(--accent) 28%, transparent), 0 8px 22px var(--shadow-1);
    }
    .brand { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px 5px 7px; border-radius: 12px; border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--rule)); background: linear-gradient(135deg, color-mix(in srgb, var(--surface-2) 90%, transparent), color-mix(in srgb, var(--surface) 80%, transparent)); flex-shrink: 0; }
    .mark { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 9px; background: var(--accent-bg); color: var(--accent); font-family: "Source Serif 4", serif; font-weight: 700; font-size: 18px; }
    .wordmark { font-style: italic; font-weight: 700; font-size: 20px; color: var(--ink); letter-spacing: 0; line-height: 1; }
    .headline { min-width: 0; flex: 1; text-align: center; }
    h1 { margin: 0; font-family: "Source Serif 4", serif; font-size: clamp(20px, 3vw, 30px); font-weight: 650; line-height: 1.05; letter-spacing: 0; }
    h1 em { font-family: Newsreader, serif; color: var(--accent); font-weight: 500; }
    .sub { margin: 5px auto 0; color: var(--ink-3); max-width: 920px; line-height: 1.35; font-size: 12.5px; }

    .wrap { padding: 8px 22px 26px; min-height: 0; overflow: hidden; }
    .review-grid { height: 100%; min-height: 0; display: grid; grid-template-columns: 260px minmax(0, 1fr) 390px; gap: 14px; align-items: stretch; }
    .rail, .detail-panel { background: var(--surface); border: 1px solid var(--rule); border-radius: 18px; box-shadow: var(--shadow-1); padding: 14px; height: 100%; min-height: 0; }
    .rail { overflow-y: auto; overscroll-behavior: contain; scrollbar-gutter: stable; }
    .detail-panel { overflow: hidden; }
    .rail-title, .panel-kicker { font-family: "JetBrains Mono", monospace; color: var(--ink-3); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 10px; }
    .metrics { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 14px; }
    .metric { background: var(--surface); border: 1px solid var(--rule); border-radius: 8px; padding: 14px 15px; box-shadow: var(--shadow-1); }
    .metric .label { color: var(--ink-3); font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; }
    .metric .value { font-family: "Source Serif 4", serif; font-size: 28px; font-weight: 650; margin-top: 2px; color: var(--ink); }
    .controls { display: grid; gap: 10px; }
    input, select { width: 100%; border: 1px solid var(--rule); background: var(--surface); border-radius: 8px; padding: 10px 12px; color: var(--ink); font: inherit; font-size: 13px; outline: none; }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 14%, transparent); }
    .cards { height: 100%; min-height: 0; overflow-y: auto; overscroll-behavior: contain; padding: 4px 14px 28px 4px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); column-gap: 24px; row-gap: 30px; align-content: start; align-items: start; }
    .signal-card { border: 1px solid var(--rule); background: var(--surface); border-radius: 8px; padding: 13px; box-shadow: var(--shadow-1); cursor: pointer; min-height: 218px; display: grid; gap: 9px; overflow: visible; transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease; }
    .signal-card:hover, .signal-card.active { border-color: color-mix(in srgb, var(--accent) 48%, var(--rule)); box-shadow: var(--shadow-2); transform: translateY(-1px); }
    .card-top { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; }
    .num { color: var(--ink-4); font-family: "JetBrains Mono", monospace; font-size: 11px; }
    .tool { font-family: "JetBrains Mono", monospace; color: var(--ink-2); }
    .title { font-family: "Source Serif 4", serif; font-size: 18px; line-height: 1.15; font-weight: 650; color: var(--ink); overflow-wrap: anywhere; }
    .meta-line { color: var(--ink-3); font-size: 12px; line-height: 1.35; }
    .signal-card .meta-line { overflow-wrap: anywhere; }
    .reason { color: var(--ink-2); font-size: 12.5px; line-height: 1.45; overflow-wrap: anywhere; }
    .source-row { display: flex; flex-wrap: wrap; align-items: center; gap: 7px; color: var(--ink-3); font-size: 12px; overflow-wrap: anywhere; }
    .source { overflow-wrap: anywhere; color: var(--ink-3); font-size: 12px; }

    .context { background: var(--violet-bg); color: var(--violet); border-color: color-mix(in srgb, var(--violet) 34%, var(--rule)); }

    .detail-mobile-head { display: contents; }
    .detail-scroll { min-height: 0; overflow: auto; padding-right: 4px; }

    .detail-label { font-family: "JetBrains Mono", monospace; color: var(--ink-3); font-size: 10px; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 4px; }

    .choice-box label { font-family: "JetBrains Mono", monospace; color: var(--ink-3); font-size: 10px; text-transform: uppercase; letter-spacing: .12em; }
    .choice-pill { background: var(--signal-bg); color: var(--signal); border-color: color-mix(in srgb, var(--signal) 34%, var(--rule)); }
    .open-link { display: inline-flex; margin-top: 8px; color: var(--accent); font-weight: 650; text-decoration: none; }
    .open-link:hover { text-decoration: underline; }
    .footer { margin-top: 12px; color: var(--ink-3); font-size: 12.5px; font-family: "JetBrains Mono", monospace; }
    @media (max-width: 980px) {
      html, body { min-height: 100%; height: auto; overflow: auto; }
      body.detail-open { overflow: hidden; }
      .app { min-height: calc(100vh - 16px); height: auto; display: block; }
      .review-grid, .cards { grid-template-columns: 1fr; }
      body { padding: 8px; }
      header { position: static; margin: 8px; flex-wrap: wrap; border-radius: 22px; }
      .headline { text-align: left; order: 3; flex-basis: 100%; }
      .wrap { padding: 8px 12px 18px; overflow: visible; }
      .review-grid { height: auto; }
      .rail, .cards { height: auto; overflow: visible; }
      .detail-panel {
        position: fixed;
        inset: 10px;
        z-index: 40;
        height: auto;
        max-height: calc(100dvh - 20px);
        transform: translateY(110%);
        opacity: 0;
        pointer-events: none;
        transition: transform 180ms ease, opacity 180ms ease;
        box-shadow: 0 24px 70px oklch(20% 0.03 250 / 0.24);
        border-radius: 20px;
        overflow: hidden;
      }
      body.detail-open .detail-panel { transform: translateY(0); opacity: 1; pointer-events: auto; }
      body.detail-open::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 30;
        background: oklch(20% 0.03 250 / 0.28);
      }
      .detail-mobile-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; position: sticky; top: 0; z-index: 2; background: var(--surface); padding-bottom: 10px; border-bottom: 1px solid var(--rule); margin-bottom: 10px; }
      .detail-close { display: grid; }
      .detail-scroll { overflow: auto; padding-right: 4px; }
    }

      const q = els.search.value.trim().toLowerCase();
      return DATA.signals.filter(s => {
        const text = [s.title, s.date, s.domain, s.claimedPlacement, s.source, s.reason, s.group, s.status, s.tool, s.plainFact, s.whyItMatters, s.evidencePosture, s.editorialAction, s.nextCheck, s.readerLane, s.coverageLabel, s.coverageNote, s.coverageMatchTitle, s.preliminaryLabel, s.preliminaryReason].join(" ").toLowerCase();
        return (!q || text.includes(q))
          && (!els.choice.value || getChoice(s.number) === els.choice.value)
          && (!els.preliminary.value || (els.preliminary.value === "yes" ? s.preliminaryRank : !s.preliminaryRank))
          && (!els.status.value || s.status === els.status.value)
          && (!els.tool.value || s.tool === els.tool.value)
          && (!els.group.value || s.group === els.group.value);
      });
    }
    function render() {
      const rows = filteredSignals();
      renderMetrics(rows);
      if (!rows.some(s => String(s.number) === selectedKey)) selectedKey = String(rows[0]?.number ?? "");
      els.cards.innerHTML = rows.map(s => {
        const choice = getChoice(s.number);
        return '<article class="signal-card ' + (String(s.number) === selectedKey ? 'active' : '') + '" data-key="' + esc(s.number) + '">'
        + '<div class="card-top"><span class="num">' + esc(s.number) + ' · ' + esc(s.tool) + '</span><span>' + (choice ? '<span class="pill choice-pill">' + esc(choiceLabels[choice]) + '</span> ' : '') + (s.preliminaryLabel ? '<span class="pill preliminary">' + esc(s.preliminaryLabel) + '</span> ' : '') + '<span class="pill ' + statusClass(s.status) + '">' + esc(s.status) + '</span>' + (s.coverageLabel ? ' <span class="pill context">' + esc(s.coverageLabel) + '</span>' : '') + '</span></div>'
        + '<div class="title">' + esc(s.title) + '</div>'
        + '<div class="meta-line">' + esc(s.date || "date n/a") + ' · ' + esc(s.domain || "domain n/a") + '</div>'
        + '<div><span class="pill">' + esc(s.group) + '</span></div>'
        + '<div class="reason">' + esc(s.reason) + '</div>'
        + '</article>';
      }).join("");
      els.cards.querySelectorAll(".signal-card").forEach(card => card.addEventListener("click", () => { selectedKey = card.dataset.key; render(); if (isMobile()) openDetail(); }));
      renderDetail(rows.find(s => String(s.number) === selectedKey) || rows[0]);
      els.footer.textContent = "Showing " + rows.length + " of " + DATA.counts.total + " entries. " + (DATA.counts.preliminaryTotal || 0) + " preliminary best-fit records marked.";
    }
    function isMobile() {
      return window.matchMedia("(max-width: 980px)").matches;
    }
    function openDetail() {
      document.body.classList.add("detail-open");
    }
    function closeDetail() {
      document.body.classList.remove("detail-open");
    }
    function linkFor(source) {
      const match = String(source || "").match(/https?:\/\/[^\s)]+/);
      return match ? match[0] : "";
    }
    function section(label, value) {
      return '<div class="detail-section"><div class="detail-label">' + esc(label) + '</div><div class="detail-value">' + esc(value || "-") + '</div></div>';
    }
    function renderDetail(s) {
      if (!s) {
        els.detail.innerHTML = '<div class="panel-kicker">Resource</div><h2>No signal selected</h2>';
        return;
      }
      const url = s.sourceUrl || linkFor(s.source);
      const selectedChoice = getChoice(s.number);
      const choiceSelect = '<div class="choice-box"><label for="detail-choice">My selection</label><select id="detail-choice">' + choiceOptions.map(([value, label]) => '<option value="' + esc(value) + '"' + (selectedChoice === value ? ' selected' : '') + '>' + esc(label) + '</option>').join("") + '</select></div>';
      els.detail.innerHTML = '<div class="detail-scroll"><div class="detail-mobile-head"><div class="panel-kicker">Expanded resource</div><button class="detail-close" type="button" aria-label="Close expanded resource">×</button></div>'
        + '<div>' + (selectedChoice ? '<span class="pill choice-pill">' + esc(choiceLabels[selectedChoice]) + '</span> ' : '') + (s.preliminaryLabel ? '<span class="pill preliminary">' + esc(s.preliminaryLabel) + '</span> ' : '') + '<span class="pill ' + statusClass(s.status) + '">' + esc(s.status) + '</span> <span class="pill">' + esc(s.group) + '</span></div>'
        + '<h2>' + esc(s.title) + '</h2>'
        + '<div class="meta-line">' + esc(s.number) + ' · ' + esc(s.tool) + ' · ' + esc(s.date || "date n/a") + '</div>'
        + choiceSelect
        + section("What happened", s.plainFact)
        + section("Why this decision", s.reason)
        + section("Why it matters", s.whyItMatters)
        + section("Source audit", s.sourceAudit)
        + section("Evidence posture", s.evidencePosture)
        + section("Editorial use", s.editorialUse)
        + (s.preliminaryReason ? section("Preliminary 20 rationale", s.preliminaryReason) : "")
        + section("Editorial action", s.editorialAction)
        + section("Reader lane", s.readerLane)
        + section("Published 9 coverage", s.coverageLabel ? s.coverageLabel + " · " + s.coverageNote : s.coverageNote)
        + (s.coverageMatchTitle ? section("Published 9 match", s.coverageMatchTitle) : "")
        + section("Next check", s.nextCheck)
        + section("Domain", s.domain)
        + section("Original claimed placement", (s.claimedPlacement || "-") + (s.claimedConfidence ? " · confidence " + s.claimedConfidence : ""))
        + section("Source", s.source)
        + (url ? '<a class="open-link" href="' + esc(url) + '" target="_blank" rel="noreferrer">Open source</a>' : '')
        + '</div>';
      const close = els.detail.querySelector(".detail-close");
      if (close) close.addEventListener("click", closeDetail);
      const detailChoice = els.detail.querySelector("#detail-choice");
      if (detailChoice) detailChoice.addEventListener("change", event => setChoice(s.number, event.target.value));
    }
    els.choice.innerHTML = '<option value="">All my selections</option>' + choiceOptions.filter(([value]) => value).map(([value, label]) => '<option value="' + esc(value) + '">' + esc(label) + '</option>').join("");
    optionize(els.status, "decisions", unique("status"));
    optionize(els.tool, "tools", unique("tool"));
    optionize(els.group, "groups", unique("group"));
    els.preliminary.innerHTML = '<option value="">All shortlist states</option><option value="yes">Preliminary 20 only</option><option value="no">Not preliminary</option>';
    [els.search, els.choice, els.preliminary, els.status, els.tool, els.group].forEach(el => el.addEventListener("input", render));
    document.addEventListener("keydown", event => { if (event.key === "Escape") closeDetail(); });
    window.matchMedia("(max-width: 980px)").addEventListener("change", event => { if (!event.matches) closeDetail(); });
    render();
  </script>
</body>
</html>
